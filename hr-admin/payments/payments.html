<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR CRM Admin - Payments Ledger</title>
    <link rel="icon" href="../../assets/opptylogo.png" type="image/png">
    <link rel="stylesheet" href="./payments.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="oppty-page-loader" class="oppty-loader-overlay">
        <div class="loader-content">
            <img src="../../assets/opptylogo.png" alt="Oppty Logo" class="oppty-logo-loader">
            <div class="wrapper">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="shadow"></div>
                <div class="shadow"></div>
                <div class="shadow"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/opptylogo.png" alt="Logo" style="width: 150px; margin-bottom: 20px;">
                <button id="sidebarClose" class="sidebar-close-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="../dashboard/dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="../candidates/candidates.html"><i class="fa-solid fa-user-group"></i> Candidates</a></li>
                <li class="active"><a href="./payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
                <li><a href="../interviews/interviews.html"><i class="fa-solid fa-video"></i> Interviews</a></li>
                <li class="finance-item"><a href="../expensives/expensives.html"><i class="fa-solid fa-file-invoice-dollar"></i> Expenses</a></li>
                <li><a href="../settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="sidebarToggle" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
                </div>
                <div class="nav-right">
                    <div class="profile-container">
                        <div class="profile" id="profileDropdownBtn">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=ff6b00&color=fff&bold=true" alt="Admin">
                        </div>
                        <div class="profile-dropdown" id="profileDropdown">
                            <a href="#" onclick="logoutAdmin()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header" style="margin-top: 30px;">
                    <h1>Payment Ledger</h1>
                </div>
                
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">Recent Transactions</h3>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label for="paymentMonthFilter" style="font-size: 0.9rem; color: var(--text-muted);">Filter by Date:</label>
                            <input type="date" id="paymentMonthFilter" class="form-control" style="width: 180px; padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Trx ID</th>
                                    <th>Candidate</th>
                                    <th>Date</th>
                                    <th>Bank Name</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTableBody">
                                <tr>
                                    <td colspan="7" style="text-align:center; padding: 40px; color: var(--text-muted);">
                                        <i class="fa-solid fa-spinner fa-spin"></i> Loading records...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="imageModal" class="modal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="./payments.js"></script>
</body>
</html>
