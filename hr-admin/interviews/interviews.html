<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR CRM Admin - Interview Schedule</title>
    <link rel="icon" href="../../assets/opptylogo.png" type="image/png">
    <link rel="stylesheet" href="./interviews.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="oppty-page-loader" class="oppty-loader-overlay">
        <div class="loader-content">
            <img src="../../assets/opptylogo.png" alt="Oppty Logo" class="oppty-logo-loader">
            <div class="wrapper">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="shadow"></div>
                <div class="shadow"></div>
                <div class="shadow"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/opptylogo.png" alt="Logo" style="width: 150px; margin-bottom: 20px;">
                <button id="sidebarClose" class="sidebar-close-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="../dashboard/dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="../candidates/candidates.html"><i class="fa-solid fa-users"></i> Candidates</a></li>
                <li><a href="../payments/payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
                <li class="active"><a href="./interviews.html"><i class="fa-solid fa-video"></i> Interviews</a></li>
                <li><a href="../expensives/expensives.html"><i class="fa-solid fa-file-invoice-dollar"></i> Expenses</a></li>
                <li><a href="../settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="sidebarToggle" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
                </div>
                <div class="nav-right">
                    <div class="profile-container">
                        <div class="profile" id="profileDropdownBtn">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=ff6b00&color=fff&bold=true" alt="Admin">
                        </div>
                        <div class="profile-dropdown" id="profileDropdown">
                            <a href="#" onclick="logoutAdmin()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header mt-15" style="margin-top: 30px;">
                    <h1>Interviews Schedule</h1>
                    <button class="btn btn-primary" id="openInterviewModalBtn"><i class="fa-solid fa-calendar-plus"></i> New Interview</button>
                </div>
                
                <div class="card">
                    <h3>Today's Schedule</h3>
                    <p id="noInterviewsMsg" style="color: var(--text-muted); padding: 40px; text-align:center;">No interviews scheduled for today.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="newInterviewModal" class="modal" style="display: none; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: var(--bg-card); padding: 30px; width: 100%; max-width: 500px; border-radius: 16px; position: relative; max-height: 90vh; overflow-y: auto;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-size: 1.4rem; color: var(--text-main);">Schedule New Interview</h2>
                <span id="closeInterviewModalBtn" style="font-size: 2rem; color: var(--text-muted); cursor: pointer; line-height: 1;">&times;</span>
            </div>

            <div class="form-group">
                <label>Select Candidate (Approved Only)</label>
                <select class="form-control" id="interviewCandidate">
                    <option value="">-- Loading Candidates... --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Meeting URL</label>
                <input type="text" id="interviewMeetingUrl" class="form-control" placeholder="e.g. meet.google.com/xxx-xxxx-xxx">
            </div>

            <div class="form-group">
                <label>Interviewer Name</label>
                <input type="text" id="interviewerName" class="form-control" placeholder="e.g. John Doe">
            </div>

            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" id="interviewDateTime" class="form-control">
            </div>

            <button class="btn btn-primary" id="saveInterviewBtn" style="width: 100%; margin-top: 15px;">
                <i class="fa-regular fa-calendar-check"></i> Schedule Now
            </button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="./interviews.js"></script>
</body>
</html>
