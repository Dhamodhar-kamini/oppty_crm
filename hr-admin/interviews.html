<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Admin - Interview Schedule</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <!-- <div style="display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-briefcase"></i> HR Admin</div> -->
                <img src="../assets/opptylogo.png" alt=" Logo" style="width: 150px; margin-bottom: 20px;">
                <button id="sidebarClose" class="sidebar-close-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="index.html"><i class="fa-solid fa-users"></i> Candidates</a></li>
                <li><a href="payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
                <li class="active"><a href="interviews.html"><i class="fa-solid fa-video"></i> Interviews</a></li>
                <li><a href="expenses.html"><i class="fa-solid fa-file-invoice-dollar"></i> Expenses</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="sidebarToggle" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
                </div>
                <div class="nav-right">
                    <div class="profile-container">
                        <div class="profile" id="profileDropdownBtn">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=ff6b00&color=fff&bold=true" alt="Admin">
                        </div>
                        <div class="profile-dropdown" id="profileDropdown">
                            <a href="#" onclick="logoutAdmin()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header mt-15" style="margin-top: 30px;">
                    <h1>Interviews Schedule</h1>
                    <button class="btn btn-primary" id="openInterviewModalBtn"><i class="fa-solid fa-calendar-plus"></i> New Interview</button>
                </div>
                
                <div class="card">
                    <h3>Today's Schedule</h3>
                    <p style="color: var(--text-muted); padding: 40px; text-align:center;">No interviews scheduled for today.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="newInterviewModal" class="modal" style="display: none; align-items: center; justify-content: center;">
    <div class="modal-content" style="background: var(--bg-card); padding: 30px; width: 100%; max-width: 500px; border-radius: 16px; position: relative; max-height: 90vh; overflow-y: auto;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="font-size: 1.4rem; color: var(--text-main);">Schedule New Interview</h2>
            <span id="closeInterviewModalBtn" style="font-size: 2rem; color: var(--text-muted); cursor: pointer; line-height: 1;">&times;</span>
        </div>

        <div class="form-group">
            <label>Select Candidate</label>
            <select class="form-control" id="interviewCandidate">
                <option value="">-- Choose Candidate --</option>
                <option>Rahul Sharma</option>
                <option>Priya Desai</option>
                <option>Amit Kumar</option>
            </select>
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="margin-bottom: 0;">Select Saved Meeting Link</label>
                <button type="button" id="toggleAddLinkBtn" style="background:none; border:none; color:var(--primary); font-size:0.8rem; cursor:pointer; font-weight:600;">+ Add New Link</button>
            </div>
            <select class="form-control" id="savedLinksDropdown">
                </select>
        </div>

        <div id="addNewLinkContainer" style="display: none; background: var(--bg-body); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--border);">
            <div class="form-group">
                <label>Link Label (e.g., Technical Room 1)</label>
                <input type="text" id="newLinkLabel" class="form-control" placeholder="Room Name">
            </div>
            <div class="form-group">
                <label>Meeting URL</label>
                <input type="text" id="newLinkUrl" class="form-control" placeholder="meet.google.com/xxx-xxxx-xxx">
            </div>
            <button type="button" class="btn btn-secondary btn-sm" id="saveNewLinkBtn" style="width: 100%;">Save to List</button>
        </div>

        <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" class="form-control">
        </div>

        <div class="form-group">
            <label>Interview Round</label>
            <select class="form-control">
                <option>Technical Round</option>
                <option>HR Screening</option>
                <option>Managerial Round</option>
            </select>
        </div>

        <button class="btn btn-primary" id="saveInterviewBtn" style="width: 100%; margin-top: 15px;">
            <i class="fa-regular fa-calendar-check"></i> Schedule Now
        </button>
    </div>
</div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="script.js"></script>
</body>
</html>
