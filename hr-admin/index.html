<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Admin - Candidates</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <!-- <div style="display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-briefcase"></i> HR Admin</div> -->
                 <img src="../assets/opptylogo.png" alt=" Logo" style="width: 150px; margin-bottom: 20px;">
                <button id="sidebarClose" class="sidebar-close-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li class="active"><a href="index.html"><i class="fa-solid fa-users"></i> Candidates</a></li>
                <li><a href="payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
                <li><a href="interviews.html"><i class="fa-solid fa-video"></i> Interviews</a></li>
                <li><a href="expenses.html"><i class="fa-solid fa-file-invoice-dollar"></i> Expenses</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="sidebarToggle" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
                </div>
                <div class="nav-right">
                    <div class="profile-container">
                        <div class="profile" id="profileDropdownBtn">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=ff6b00&color=fff&bold=true" alt="Admin">
                        </div>
                        <div class="profile-dropdown" id="profileDropdown">
                            <a href="#" onclick="logoutAdmin()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header mt-15" style="margin-top: 30px;">
                    <h1>Candidates List</h1>
                    <div class="header-actions">
                        <div class="page-filter">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="candidatesSearch" placeholder="Search name or experience...">
                        </div>
                        </div>
                </div>
                
                <div class="card">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Candidate Info</th>
                                    <th>Contact</th>
                                    <th>Experience</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="candidatesBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="script.js"></script>
</body>
</html>
