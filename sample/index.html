<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Chase - Cinematic Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #cinematic-bars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .bar-top, .bar-bottom {
            position: absolute;
            width: 100%;
            height: 12%;
            background: #000;
            z-index: 10;
        }

        .bar-top { top: 0; }
        .bar-bottom { bottom: 0; }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1.5s ease;
        }

        #loading-screen h1 {
            color: #c4a35a;
            font-size: 3em;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(196, 163, 90, 0.5);
        }

        #loading-bar-container {
            width: 300px;
            height: 3px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #c4a35a, #ffd700);
            transition: width 0.3s;
        }

        #subtitle {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.4em;
            text-align: center;
            z-index: 20;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            opacity: 0;
            transition: opacity 0.8s ease;
            letter-spacing: 2px;
            max-width: 80%;
        }

        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
        }

        #title-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
            opacity: 0;
            pointer-events: none;
        }

        #title-card h1 {
            color: #c4a35a;
            font-size: 5em;
            letter-spacing: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 60px rgba(196, 163, 90, 0.8);
        }

        #title-card p {
            color: #999;
            font-size: 1.2em;
            letter-spacing: 10px;
            margin-top: 20px;
        }

        #restart-btn {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #c4a35a;
            color: #c4a35a;
            font-size: 1.2em;
            letter-spacing: 5px;
            cursor: pointer;
            display: none;
            transition: all 0.3s;
        }

        #restart-btn:hover {
            background: #c4a35a;
            color: #000;
        }

        .lens-flare {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
        }

        #heartbeat {
            position: fixed;
            top: 15%;
            right: 5%;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s;
        }

        #heartbeat-text {
            color: #ff3333;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        #speed-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7;
            opacity: 0;
        }

        .motion-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            backdrop-filter: blur(0px);
            transition: backdrop-filter 0.3s;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1>The Chase</h1>
    <div id="loading-bar-container">
        <div id="loading-bar"></div>
    </div>
</div>

<div id="canvas-container"></div>

<div id="cinematic-bars">
    <div class="bar-top"></div>
    <div class="bar-bottom"></div>
</div>

<div id="vignette"></div>

<div id="title-card">
    <h1>The Chase</h1>
    <p>Deep in the wilderness</p>
</div>

<div id="subtitle"></div>

<div id="heartbeat">
    <span id="heartbeat-text">♥ 165 BPM</span>
</div>

<canvas id="speed-lines"></canvas>

<div class="motion-blur"></div>

<button id="restart-btn" onclick="location.reload()">REPLAY</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ==================== CINEMATIC ENGINE ====================

class CinematicEngine {
    constructor() {
        this.scene = new THREE.Scene();
        this.clock = new THREE.Clock();
        this.time = 0;
        this.phase = 'loading';
        this.cameraShakeIntensity = 0;
        this.trees = [];
        this.rocks = [];
        this.particles = [];
        this.waterParticles = [];
        this.dustParticles = [];
        this.leaves = [];
        this.mistParticles = [];
        this.fireflies = [];
        this.manParts = {};
        this.tigerParts = {};
        this.runCycle = 0;
        this.tigerRunCycle = 0;
        this.manPosition = new THREE.Vector3(0, 0, 0);
        this.tigerPosition = new THREE.Vector3(0, 0, -25);
        this.subtitle = document.getElementById('subtitle');
        this.heartbeat = document.getElementById('heartbeat');
        this.heartbeatText = document.getElementById('heartbeat-text');
        this.speedLinesCanvas = document.getElementById('speed-lines');
        this.speedLinesCtx = this.speedLinesCanvas.getContext('2d');
        this.waterfallReached = false;
        this.jumpStarted = false;
        this.jumpTime = 0;
        this.fogDensity = 0.015;
        this.audioCtx = null;

        this.init();
    }

    init() {
        // Renderer
        this.renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: false,
            powerPreference: "high-performance"
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 0.8;
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(this.renderer.domElement);

        // Camera
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 8, 20);

        // Speed lines canvas
        this.speedLinesCanvas.width = window.innerWidth;
        this.speedLinesCanvas.height = window.innerHeight;

        // Fog
        this.scene.fog = new THREE.FogExp2(0x1a2a1a, this.fogDensity);

        this.createLighting();
        this.createForest();
        this.createGround();
        this.createMan();
        this.createTiger();
        this.createWaterfall();
        this.createParticleSystems();
        this.createMist();
        this.createFireflies();
        this.createSkybox();

        // Audio
        this.initAudio();

        // Loading simulation
        this.simulateLoading();

        window.addEventListener('resize', () => this.onResize());
    }

    initAudio() {
        try {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }

    playHeartbeat() {
        if (!this.audioCtx) return;
        try {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.frequency.value = 60;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, this.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(this.audioCtx.currentTime + 0.3);
        } catch(e) {}
    }

    playFootstep() {
        if (!this.audioCtx) return;
        try {
            const bufferSize = this.audioCtx.sampleRate * 0.1;
            const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
            }
            const source = this.audioCtx.createBufferSource();
            source.buffer = buffer;
            const filter = this.audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 300;
            const gain = this.audioCtx.createGain();
            gain.gain.value = 0.15;
            source.connect(filter);
            filter.connect(gain);
            gain.connect(this.audioCtx.destination);
            source.start();
        } catch(e) {}
    }

    playWaterfall() {
        if (!this.audioCtx || this.waterfallAudioPlaying) return;
        this.waterfallAudioPlaying = true;
        try {
            const bufferSize = this.audioCtx.sampleRate * 4;
            const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.3;
            }
            const source = this.audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            const filter = this.audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            const gain = this.audioCtx.createGain();
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(0.2, this.audioCtx.currentTime + 3);
            source.connect(filter);
            filter.connect(gain);
            gain.connect(this.audioCtx.destination);
            source.start();
            this.waterfallGain = gain;
        } catch(e) {}
    }

    simulateLoading() {
        let progress = 0;
        const loadingBar = document.getElementById('loading-bar');
        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) {
                progress = 100;
                loadingBar.style.width = '100%';
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        this.startCinematic();
                    }, 1500);
                }, 500);
            } else {
                loadingBar.style.width = progress + '%';
            }
        }, 200);
    }

    createSkybox() {
        const skyGeo = new THREE.SphereGeometry(500, 32, 32);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: {
                topColor: { value: new THREE.Color(0x0a1520) },
                bottomColor: { value: new THREE.Color(0x1a3a1a) },
                offset: { value: 20 },
                exponent: { value: 0.4 }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                }
            `,
            side: THREE.BackSide
        });
        this.scene.add(new THREE.Mesh(skyGeo, skyMat));
    }

    createLighting() {
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x1a2a15, 0.3);
        this.scene.add(ambientLight);

        // Main directional (sun rays through canopy)
        this.sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        this.sunLight.position.set(30, 50, 20);
        this.sunLight.castShadow = true;
        this.sunLight.shadow.mapSize.width = 2048;
        this.sunLight.shadow.mapSize.height = 2048;
        this.sunLight.shadow.camera.near = 0.5;
        this.sunLight.shadow.camera.far = 200;
        this.sunLight.shadow.camera.left = -50;
        this.sunLight.shadow.camera.right = 50;
        this.sunLight.shadow.camera.top = 50;
        this.sunLight.shadow.camera.bottom = -50;
        this.sunLight.shadow.bias = -0.001;
        this.scene.add(this.sunLight);

        // God rays (volumetric light shafts simulation)
        for (let i = 0; i < 8; i++) {
            const rayGeo = new THREE.PlaneGeometry(2, 40);
            const rayMat = new THREE.MeshBasicMaterial({
                color: 0xffeeaa,
                transparent: true,
                opacity: 0.03,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const ray = new THREE.Mesh(rayGeo, rayMat);
            ray.position.set(
                Math.random() * 100 - 50,
                15,
                Math.random() * 200 - 100
            );
            ray.rotation.y = Math.random() * Math.PI;
            ray.rotation.z = Math.random() * 0.3 - 0.15;
            this.scene.add(ray);
        }

        // Rim light (back light for dramatic effect)
        const rimLight = new THREE.DirectionalLight(0x4488ff, 0.5);
        rimLight.position.set(-20, 30, -40);
        this.scene.add(rimLight);

        // Fill light
        const fillLight = new THREE.HemisphereLight(0x4488aa, 0x224422, 0.4);
        this.scene.add(fillLight);

        // Point lights for atmosphere
        const pointLight1 = new THREE.PointLight(0xffaa44, 0.5, 30);
        pointLight1.position.set(10, 8, -20);
        this.scene.add(pointLight1);
    }

    createGround() {
        // Main ground
        const groundGeo = new THREE.PlaneGeometry(200, 600, 100, 300);
        const positions = groundGeo.attributes.position.array;
        
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i + 1];
            let height = Math.sin(x * 0.1) * 0.5 + Math.cos(z * 0.05) * 0.8;
            height += (Math.random() - 0.5) * 0.3;
            
            // Waterfall cliff
            if (z < -120) {
                height -= (Math.abs(z + 120)) * 0.8;
            }
            
            // Path (flatten center)
            const distFromCenter = Math.abs(x);
            if (distFromCenter < 4) {
                height *= 0.3;
            }
            
            positions[i + 2] = height;
        }
        
        groundGeo.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x2a3a1a,
            roughness: 0.9,
            metalness: 0.0,
        });
        
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        this.scene.add(ground);
        this.ground = ground;

        // Dirt path
        const pathGeo = new THREE.PlaneGeometry(5, 600, 10, 100);
        const pathMat = new THREE.MeshStandardMaterial({
            color: 0x4a3520,
            roughness: 1.0,
            metalness: 0.0,
        });
        const path = new THREE.Mesh(pathGeo, pathMat);
        path.rotation.x = -Math.PI / 2;
        path.position.y = 0.05;
        path.receiveShadow = true;
        this.scene.add(path);
    }

    createTree(x, z, scale = 1) {
        const treeGroup = new THREE.Group();
        
        // Trunk
        const trunkHeight = (6 + Math.random() * 6) * scale;
        const trunkGeo = new THREE.CylinderGeometry(0.2 * scale, 0.4 * scale, trunkHeight, 8);
        const trunkMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(0x3a2a15).lerp(new THREE.Color(0x5a4a30), Math.random()),
            roughness: 0.95,
            metalness: 0.0
        });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = trunkHeight / 2;
        trunk.castShadow = true;
        trunk.receiveShadow = true;
        treeGroup.add(trunk);

        // Branches
        const branchCount = 3 + Math.floor(Math.random() * 4);
        for (let i = 0; i < branchCount; i++) {
            const branchLen = (2 + Math.random() * 3) * scale;
            const branchGeo = new THREE.CylinderGeometry(0.05 * scale, 0.12 * scale, branchLen, 6);
            const branch = new THREE.Mesh(branchGeo, trunkMat);
            const branchHeight = trunkHeight * (0.4 + Math.random() * 0.5);
            branch.position.y = branchHeight;
            const angle = Math.random() * Math.PI * 2;
            branch.position.x = Math.cos(angle) * 0.5;
            branch.position.z = Math.sin(angle) * 0.5;
            branch.rotation.z = (Math.random() - 0.5) * 1.2;
            branch.rotation.x = (Math.random() - 0.5) * 0.5;
            branch.castShadow = true;
            treeGroup.add(branch);
        }

        // Foliage layers
        const foliageLayers = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < foliageLayers; i++) {
            const foliageRadius = (2 + Math.random() * 2.5) * scale;
            const foliageGeo = new THREE.SphereGeometry(foliageRadius, 8, 8);
            
            // Deform foliage
            const fPos = foliageGeo.attributes.position.array;
            for (let j = 0; j < fPos.length; j += 3) {
                fPos[j] += (Math.random() - 0.5) * foliageRadius * 0.4;
                fPos[j + 1] += (Math.random() - 0.5) * foliageRadius * 0.3;
                fPos[j + 2] += (Math.random() - 0.5) * foliageRadius * 0.4;
            }
            foliageGeo.computeVertexNormals();

            const greenVariant = Math.random();
            const foliageMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.28 + greenVariant * 0.08, 0.5 + greenVariant * 0.3, 0.15 + greenVariant * 0.15),
                roughness: 0.8,
                metalness: 0.0,
                transparent: true,
                opacity: 0.9
            });
            const foliage = new THREE.Mesh(foliageGeo, foliageMat);
            foliage.position.y = trunkHeight * (0.7 + i * 0.15) + Math.random() * 2;
            foliage.position.x = (Math.random() - 0.5) * 2 * scale;
            foliage.position.z = (Math.random() - 0.5) * 2 * scale;
            foliage.castShadow = true;
            foliage.receiveShadow = true;
            treeGroup.add(foliage);
        }

        // Roots
        for (let i = 0; i < 4; i++) {
            const rootGeo = new THREE.CylinderGeometry(0.05 * scale, 0.15 * scale, 2 * scale, 4);
            const root = new THREE.Mesh(rootGeo, trunkMat);
            root.position.y = 0.3;
            const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.5;
            root.position.x = Math.cos(angle) * 0.4 * scale;
            root.position.z = Math.sin(angle) * 0.4 * scale;
            root.rotation.z = Math.cos(angle) * 0.8;
            root.rotation.x = Math.sin(angle) * 0.8;
            treeGroup.add(root);
        }

        treeGroup.position.set(x, 0, z);
        treeGroup.rotation.y = Math.random() * Math.PI * 2;
        this.scene.add(treeGroup);
        this.trees.push(treeGroup);
        return treeGroup;
    }

    createForest() {
        // Dense forest on both sides of path
        for (let z = 50; z > -200; z -= 3) {
            // Left side
            for (let i = 0; i < 3; i++) {
                const x = -(5 + Math.random() * 40);
                const zOff = z + Math.random() * 3;
                this.createTree(x, zOff, 0.7 + Math.random() * 0.8);
            }
            // Right side
            for (let i = 0; i < 3; i++) {
                const x = 5 + Math.random() * 40;
                const zOff = z + Math.random() * 3;
                this.createTree(x, zOff, 0.7 + Math.random() * 0.8);
            }
        }

        // Some trees closer to path for near-misses
        for (let z = 30; z > -110; z -= 15) {
            const side = Math.random() > 0.5 ? 1 : -1;
            this.createTree(side * (3 + Math.random() * 2), z + Math.random() * 5, 0.5 + Math.random() * 0.4);
        }

        // Undergrowth (bushes and ferns)
        for (let i = 0; i < 200; i++) {
            const bushGeo = new THREE.SphereGeometry(0.5 + Math.random() * 1, 6, 6);
            const fPos = bushGeo.attributes.position.array;
            for (let j = 0; j < fPos.length; j += 3) {
                fPos[j] += (Math.random() - 0.5) * 0.5;
                fPos[j + 1] *= 0.6;
                fPos[j + 2] += (Math.random() - 0.5) * 0.5;
            }
            const bushMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.6, 0.1 + Math.random() * 0.15),
                roughness: 0.9
            });
            const bush = new THREE.Mesh(bushGeo, bushMat);
            bush.position.set(
                (Math.random() - 0.5) * 80,
                0.3,
                Math.random() * 200 - 150
            );
            if (Math.abs(bush.position.x) < 4) bush.position.x = (bush.position.x > 0 ? 4 : -4) + Math.random();
            bush.castShadow = true;
            this.scene.add(bush);
        }

        // Rocks
        for (let i = 0; i < 80; i++) {
            const rockSize = 0.3 + Math.random() * 1.5;
            const rockGeo = new THREE.DodecahedronGeometry(rockSize, 1);
            const rPos = rockGeo.attributes.position.array;
            for (let j = 0; j < rPos.length; j += 3) {
                rPos[j] += (Math.random() - 0.5) * rockSize * 0.3;
                rPos[j + 1] += (Math.random() - 0.5) * rockSize * 0.3;
                rPos[j + 2] += (Math.random() - 0.5) * rockSize * 0.3;
            }
            rockGeo.computeVertexNormals();
            const rockMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.08, 0.1, 0.15 + Math.random() * 0.2),
                roughness: 0.95,
                metalness: 0.1
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(
                (Math.random() - 0.5) * 60,
                rockSize * 0.3,
                Math.random() * 200 - 150
            );
            rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            rock.castShadow = true;
            rock.receiveShadow = true;
            this.scene.add(rock);
            this.rocks.push(rock);
        }

        // Fallen logs
        for (let i = 0; i < 10; i++) {
            const logGeo = new THREE.CylinderGeometry(0.2, 0.3, 5 + Math.random() * 4, 8);
            const logMat = new THREE.MeshStandardMaterial({
                color: 0x3a2815,
                roughness: 0.95
            });
            const log = new THREE.Mesh(logGeo, logMat);
            log.position.set(
                (Math.random() - 0.5) * 40,
                0.2,
                Math.random() * 150 - 100
            );
            log.rotation.z = Math.PI / 2;
            log.rotation.y = Math.random() * Math.PI;
            if (Math.abs(log.position.x) < 5) log.position.x += (log.position.x > 0 ? 5 : -5);

            this.scene.add(log);
        }
    }

    createWaterfall() {
        this.waterfallGroup = new THREE.Group();
        const waterfallZ = -130;

        // Cliff face
        const cliffGeo = new THREE.BoxGeometry(40, 40, 8);
        const cliffMat = new THREE.MeshStandardMaterial({
            color: 0x3a3028,
            roughness: 0.95,
            metalness: 0.1
        });
        const cliff = new THREE.Mesh(cliffGeo, cliffMat);
        cliff.position.set(0, -18, waterfallZ);
        cliff.receiveShadow = true;
        cliff.castShadow = true;
        this.waterfallGroup.add(cliff);

        // Cliff top edge rocks
        for (let i = 0; i < 30; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.5 + Math.random() * 1.5, 1);
            const rPos = rockGeo.attributes.position.array;
            for (let j = 0; j < rPos.length; j += 3) {
                rPos[j] += (Math.random() - 0.5) * 0.3;
                rPos[j + 1] += (Math.random() - 0.5) * 0.3;
                rPos[j + 2] += (Math.random() - 0.5) * 0.3;
            }
            rockGeo.computeVertexNormals();
            const rockMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.08, 0.15, 0.2 + Math.random() * 0.15),
                roughness: 0.9
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(
                (Math.random() - 0.5) * 30,
                0.5,
                waterfallZ + (Math.random() - 0.5) * 3
            );
            rock.castShadow = true;
            this.waterfallGroup.add(rock);
        }

        // Water stream (falling water)
        const waterGeo = new THREE.PlaneGeometry(6, 40, 20, 80);
        const waterMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color1: { value: new THREE.Color(0x4488aa) },
                color2: { value: new THREE.Color(0xaaddff) },
                opacity: { value: 0.7 }
            },
            vertexShader: `
                uniform float time;
                varying vec2 vUv;
                varying float vDisplacement;
                void main() {
                    vUv = uv;
                    vec3 pos = position;
                    float displacement = sin(pos.y * 3.0 + time * 5.0) * 0.3 + 
                                        sin(pos.y * 7.0 + time * 8.0) * 0.15;
                    pos.x += displacement;
                    pos.z += sin(pos.y * 5.0 + time * 6.0) * 0.2;
                    vDisplacement = displacement;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 color1;
                uniform vec3 color2;
                uniform float opacity;
                uniform float time;
                varying vec2 vUv;
                varying float vDisplacement;
                void main() {
                    float flow = fract(vUv.y * 3.0 - time * 2.0);
                    vec3 color = mix(color1, color2, flow + vDisplacement * 0.5);
                    float alpha = opacity * (0.5 + 0.5 * sin(vUv.y * 20.0 + time * 10.0));
                    alpha *= smoothstep(0.0, 0.2, vUv.x) * smoothstep(1.0, 0.8, vUv.x);
                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        this.waterfall = new THREE.Mesh(waterGeo, waterMat);
        this.waterfall.position.set(0, -18, waterfallZ + 4.5);
        this.waterfallGroup.add(this.waterfall);
        this.waterfallMaterial = waterMat;

        // Pool at bottom
        const poolGeo = new THREE.CircleGeometry(12, 32);
        const poolMat = new THREE.MeshStandardMaterial({
            color: 0x1a4466,
            roughness: 0.1,
            metalness: 0.3,
            transparent: true,
            opacity: 0.85
        });
        const pool = new THREE.Mesh(poolGeo, poolMat);
        pool.rotation.x = -Math.PI / 2;
        pool.position.set(0, -37, waterfallZ + 10);
        this.waterfallGroup.add(pool);

        // Splash particles at bottom
        for (let i = 0; i < 50; i++) {
            const splashGeo = new THREE.SphereGeometry(0.1 + Math.random() * 0.15, 6, 6);
            const splashMat = new THREE.MeshStandardMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.6,
                emissive: 0x224466,
                emissiveIntensity: 0.2
            });
            const splash = new THREE.Mesh(splashGeo, splashMat);
            splash.userData = {
                baseX: (Math.random() - 0.5) * 6,
                baseY: -36,
                baseZ: waterfallZ + 6 + Math.random() * 4,
                speed: 1 + Math.random() * 3,
                phase: Math.random() * Math.PI * 2,
                maxHeight: 1 + Math.random() * 3
            };
            this.waterfallGroup.add(splash);
            this.waterParticles.push(splash);
        }

        // Mist at waterfall base
        for (let i = 0; i < 30; i++) {
            const mistGeo = new THREE.SphereGeometry(1 + Math.random() * 2, 8, 8);
            const mistMat = new THREE.MeshBasicMaterial({
                color: 0xccddee,
                transparent: true,
                opacity: 0.08,
                depthWrite: false
            });
            const mist = new THREE.Mesh(mistGeo, mistMat);
            mist.position.set(
                (Math.random() - 0.5) * 15,
                -35 + Math.random() * 5,
                waterfallZ + 8 + Math.random() * 8
            );
            mist.userData = { phase: Math.random() * Math.PI * 2 };
            this.waterfallGroup.add(mist);
            this.mistParticles.push(mist);
        }

        this.scene.add(this.waterfallGroup);
    }

    createParticleSystems() {
        // Dust particles
        const dustCount = 500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        const dustSizes = new Float32Array(dustCount);
        
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i * 3] = (Math.random() - 0.5) * 60;
            dustPositions[i * 3 + 1] = Math.random() * 20;
            dustPositions[i * 3 + 2] = Math.random() * 200 - 150;
            dustSizes[i] = Math.random() * 3 + 1;
        }
        
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));

        const dustMat = new THREE.PointsMaterial({
            color: 0xffeecc,
            size: 0.15,
            transparent: true,

            blending: THREE.AdditiveBlending,

    animateMan(dt, speed) {
        this.runCycle += dt * speed * 1.2;
        const rc = this.runCycle;

        // Torso bob and lean
        this.manParts.torso.position.y = 2.1 + Math.abs(Math.sin(rc * 2)) * 0.15;
        this.manParts.torso.rotation.x = -0.15 + Math.sin(rc * 2) * 0.05;
        this.manParts.torso.rotation.z = Math.sin(rc) * 0.05;

        // Head
        this.manParts.head.position.y = 2.8 + Math.abs(Math.sin(rc * 2)) * 0.15;
        this.manParts.head.rotation.x = -0.1;
        this.manParts.head.rotation.y = Math.sin(rc * 0.5) * 0.15;

        // Arms pumping
        this.manParts.leftUpperArm.rotation.x = Math.sin(rc) * 1.2;
        this.manParts.rightUpperArm.rotation.x = -Math.sin(rc) * 1.2;
        this.manParts.leftForearm.rotation.x = -Math.abs(Math.sin(rc)) * 0.8 - 0.5;
        this.manParts.rightForearm.rotation.x = -Math.abs(Math.sin(rc + Math.PI)) * 0.8 - 0.5;

        // Legs
        this.manParts.leftUpperLeg.rotation.x = -Math.sin(rc) * 1.0;
        this.manParts.rightUpperLeg.rotation.x = Math.sin(rc) * 1.0;
        this.manParts.leftLowerLeg.rotation.x = Math.max(0, Math.sin(rc - 0.5)) * 1.2;
        this.manParts.rightLowerLeg.rotation.x = Math.max(0, -Math.sin(rc - 0.5)) * 1.2;

        // Vertical bounce
        this.manGroup.position.y = Math.abs(Math.sin(rc * 2)) * 0.3;

        // Emit foot dust
        if (Math.sin(rc * 2) < -0.8) {
            this.emitFootDust(this.manGroup.position.clone());
        }
    }

    animateManJump(dt, jumpProgress) {
        // Jumping animation
        const jp = jumpProgress;

        if (jp < 0.15) {
            // Crouch before jump
            const crouch = jp / 0.15;
            this.manParts.leftUpperLeg.rotation.x = -crouch * 1.5;
            this.manParts.rightUpperLeg.rotation.x = -crouch * 1.5;
            this.manParts.leftLowerLeg.rotation.x = crouch * 2.0;
            this.manParts.rightLowerLeg.rotation.x = crouch * 2.0;
            this.manParts.torso.rotation.x = crouch * 0.3;
            this.manParts.leftUpperArm.rotation.x = crouch * 0.5;
            this.manParts.rightUpperArm.rotation.x = crouch * 0.5;
        } else if (jp < 0.4) {
            // Launch
            const launch = (jp - 0.15) / 0.25;
            this.manParts.leftUpperLeg.rotation.x = -1.5 + launch * 1.0;
            this.manParts.rightUpperLeg.rotation.x = -1.5 + launch * 2.0;
            this.manParts.leftLowerLeg.rotation.x = 2.0 - launch * 1.5;
            this.manParts.rightLowerLeg.rotation.x = 2.0 - launch * 1.5;
            this.manParts.torso.rotation.x = 0.3 - launch * 0.6;
            this.manParts.leftUpperArm.rotation.x = 0.5 + launch * 2.0;
            this.manParts.rightUpperArm.rotation.x = 0.5 + launch * 2.0;
            this.manParts.leftForearm.rotation.x = -launch * 0.5;
            this.manParts.rightForearm.rotation.x = -launch * 0.5;
        } else {
            // Free fall - spread eagle / diving
            const fall = (jp - 0.4) / 0.6;
            this.manParts.leftUpperArm.rotation.x = 2.5 - fall * 1.0;
            this.manParts.rightUpperArm.rotation.x = 2.5 - fall * 1.0;
            this.manParts.leftUpperArm.rotation.z = -0.5 - fall * 0.5;
            this.manParts.rightUpperArm.rotation.z = 0.5 + fall * 0.5;
            this.manParts.leftForearm.rotation.x = -0.5 - fall * 0.3;
            this.manParts.rightForearm.rotation.x = -0.5 - fall * 0.3;
            this.manParts.leftUpperLeg.rotation.x = -0.5 + Math.sin(fall * 5) * 0.3;
            this.manParts.rightUpperLeg.rotation.x = 0.5 + Math.sin(fall * 5 + 1) * 0.3;
            this.manParts.leftLowerLeg.rotation.x = 0.5 + fall * 0.5;
            this.manParts.rightLowerLeg.rotation.x = 0.5 + fall * 0.5;
            this.manParts.torso.rotation.x = -0.3 + fall * 0.5;
            this.manParts.head.rotation.x = fall * 0.3;

            // Slight body rotation during fall
            this.manGroup.rotation.x = fall * 0.3;
        }
    }

    animateTiger(dt, speed) {
        this.tigerRunCycle += dt * speed * 1.5;
        const rc = this.tigerRunCycle;

        // Galloping motion
        this.tigerParts.body.position.y = 1.2 + Math.abs(Math.sin(rc * 2)) * 0.3;
        this.tigerParts.body.rotation.x = Math.sin(rc * 2) * 0.1;
        this.tigerParts.body.rotation.z = Math.sin(rc) * 0.03;

        // Head
        this.tigerParts.head.position.y = 1.5 + Math.abs(Math.sin(rc * 2)) * 0.25;
        this.tigerParts.head.rotation.x = Math.sin(rc * 2) * 0.05;

        // Jaw (roaring)
        const jawOpen = Math.max(0, Math.sin(rc * 0.5)) * 0.15;
        this.tigerParts.jaw.position.y = 1.22 - jawOpen;
        this.tigerParts.jaw.rotation.x = jawOpen * 2;

        // Legs gallop
        this.tigerParts.frontLeftLeg.rotation.x = Math.sin(rc) * 1.2;
        this.tigerParts.frontRightLeg.rotation.x = Math.sin(rc + Math.PI) * 1.2;
        this.tigerParts.backLeftLeg.rotation.x = Math.sin(rc + Math.PI * 0.5) * 1.4;
        this.tigerParts.backRightLeg.rotation.x = Math.sin(rc + Math.PI * 1.5) * 1.4;

        // Body stretch during gallop
        this.tigerGroup.scale.z = 1 + Math.sin(rc * 2) * 0.05;

        // Tail whipping
        this.tigerParts.tail.rotation.y = Math.sin(rc * 3) * 0.5;
        this.tigerParts.tail.rotation.z = Math.sin(rc * 2) * 0.3;

        // Ears
        this.tigerParts.leftEar.rotation.x = Math.sin(rc * 4) * 0.2;
        this.tigerParts.rightEar.rotation.x = Math.sin(rc * 4 + 1) * 0.2;

        // Vertical bounce
        this.tigerGroup.position.y = Math.abs(Math.sin(rc * 2)) * 0.4;

        // Emit dust
        if (Math.sin(rc * 2) < -0.8) {
            this.emitFootDust(this.tigerGroup.position.clone());
        }
    }

    emitFootDust(position) {
        for (let i = 0; i < 3; i++) {
            const p = this.footDustParticles.find(p => !p.userData.active);
            if (p) {
                p.userData.active = true;
                p.userData.life = 1;
                p.position.copy(position);
                p.position.y = 0.1;
                p.position.x += (Math.random() - 0.5) * 0.5;
                p.position.z += (Math.random() - 0.5) * 0.5;
                p.userData.vel.set(
                    (Math.random() - 0.5) * 2,
                    1 + Math.random() * 2,
                    (Math.random() - 0.5) * 2
                );
                p.material.opacity = 0.5;
                p.scale.setScalar(1);
            }
        }
    }

    updateParticles(dt) {
        // Foot dust
        this.footDustParticles.forEach(p => {
            if (p.userData.active) {
                p.userData.life -= dt * 1.5;
                if (p.userData.life <= 0) {
                    p.userData.active = false;
                    p.material.opacity = 0;
                    return;
                }
                p.position.add(p.userData.vel.clone().multiplyScalar(dt));
                p.userData.vel.y -= dt * 5;
                p.material.opacity = p.userData.life * 0.4;
                p.scale.setScalar(1 + (1 - p.userData.life) * 2);
            }
        });

        // Floating dust
        if (this.dustSystem) {
            const positions = this.dustSystem.geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i] += Math.sin(this.time + i) * 0.005;
                positions[i + 1] += Math.sin(this.time * 0.5 + i * 0.5) * 0.003;
                positions[i + 2] += 0.01;
                if (positions[i + 2] > 50) positions[i + 2] = -150;
            }
            this.dustSystem.geometry.attributes.position.needsUpdate = true;
        }

        // Leaves
        this.leaves.forEach(leaf => {
            const d = leaf.userData;
            leaf.position.y -= d.fallSpeed * dt;
            leaf.position.x += Math.sin(this.time * d.swaySpeed + d.phase) * d.swayAmount * dt;
            leaf.rotation.x += d.rotSpeed * dt;
            leaf.rotation.y += d.rotSpeed * 0.7 * dt;
            leaf.rotation.z += d.rotSpeed * 0.5 * dt;
            
            if (leaf.position.y < 0) {
                leaf.position.y = 15 + Math.random() * 5;
                leaf.position.x = this.manGroup.position.x + (Math.random() - 0.5) * 30;
                leaf.position.z = this.manGroup.position.z + (Math.random() - 0.5) * 30;
            }
        });

        // Water particles
        this.waterParticles.forEach(wp => {
            const d = wp.userData;
            const t = this.time * d.speed + d.phase;
            wp.position.x = d.baseX + Math.sin(t * 2) * 0.5;
            wp.position.y = d.baseY + Math.abs(Math.sin(t)) * d.maxHeight;
            wp.position.z = d.baseZ + Math.cos(t * 1.5) * 0.3;
            wp.material.opacity = 0.3 + Math.sin(t) * 0.3;
        });

        // Mist
        this.mistParticles.forEach(mp => {
            mp.position.x += Math.sin(this.time * 0.5 + mp.userData.phase) * 0.02;
            mp.position.y += Math.sin(this.time * 0.3 + mp.userData.phase) * 0.01;
            mp.material.opacity = 0.05 + Math.sin(this.time * 0.5 + mp.userData.phase) * 0.03;
        });

        // Fireflies
        this.fireflies.forEach(ff => {
            const d = ff.userData;
            const glow = Math.max(0, Math.sin(this.time * d.speed + d.phase));
            ff.material.opacity = glow * 0.6;
            if (d.light) d.light.intensity = glow * 0.5;
            ff.position.y = d.baseY + Math.sin(this.time * 0.5 + d.phase) * 1;
            ff.position.x = d.baseX + Math.sin(this.time * 0.3 + d.phase * 2) * 2;
        });
    }

    drawSpeedLines() {
        const ctx = this.speedLinesCtx;
        const w = this.speedLinesCanvas.width;
        const h = this.speedLinesCanvas.height;
        ctx.clearRect(0, 0, w, h);

        if (this.phase !== 'chase' && this.phase !== 'close_chase') return;

        const centerX = w / 2;
        const centerY = h / 2;
        const intensity = this.phase === 'close_chase' ? 0.15 : 0.05;

        ctx.strokeStyle = `rgba(255, 255, 255, ${intensity})`;
        ctx.lineWidth = 1;

        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const innerRadius = 100 + Math.random() * 200;
            const outerRadius = innerRadius + 100 + Math.random() * 200;

            ctx.beginPath();
            ctx.moveTo(
                centerX + Math.cos(angle) * innerRadius,
                centerY + Math.sin(angle) * innerRadius
            );
            ctx.lineTo(
                centerX + Math.cos(angle) * outerRadius,
                centerY + Math.sin(angle) * outerRadius
            );
            ctx.stroke();
        }
    }

    showSubtitle(text, duration = 3000) {
        this.subtitle.textContent = text;
        this.subtitle.style.opacity = '1';
        clearTimeout(this.subtitleTimeout);
        this.subtitleTimeout = setTimeout(() => {
            this.subtitle.style.opacity = '0';
        }, duration);
    }

    startCinematic() {
        this.phase = 'title';
        this.phaseTime = 0;
        
        // Show title card
        const titleCard = document.getElementById('title-card');
        titleCard.style.opacity = '1';
        titleCard.style.transition = 'opacity 2s ease';

        setTimeout(() => {
            titleCard.style.opacity = '0';
            setTimeout(() => {
                this.phase = 'establishing';
                this.phaseTime = 0;
            }, 2000);
        }, 4000);

        // Start audio context on user interaction
        document.addEventListener('click', () => {
            if (this.audioCtx && this.audioCtx.state === 'suspended') {
                this.audioCtx.resume();
            }
        }, { once: true });

        this.animate();
    }

    updateCinematic(dt) {
        this.phaseTime += dt;
        const pt = this.phaseTime;
        const moveSpeed = 12;

        switch (this.phase) {
            case 'title':
                // Static forest shot
                this.camera.position.set(15, 5, 30);
                this.camera.lookAt(0, 5, 0);
                this.camera.position.y += Math.sin(this.time * 0.3) * 0.1;
                break;

            case 'establishing':
                // Crane shot through forest canopy
                if (pt < 5) {
                    const progress = pt / 5;
                    this.camera.position.set(
                        20 - progress * 20,
                        15 - progress * 10,
                        40 - progress * 30
                    );
                    this.camera.lookAt(0, 2, 0);
                    
                    if (pt > 2 && pt < 4) {
                        this.showSubtitle('Deep within the ancient forest...', 3000);
                    }
                } else {
                    this.phase = 'reveal_tiger';
                    this.phaseTime = 0;
                    this.showSubtitle('A predator stalks its prey.', 3000);
                }
                break;

            case 'reveal_tiger':
                // Close-up of tiger
                if (pt < 4) {
                    const progress = pt / 4;
                    this.camera.position.set(
                        2 * Math.sin(progress * 0.5),
                        2.5,
                        this.tigerGroup.position.z + 4
                    );
                    this.camera.lookAt(this.tigerGroup.position.x, 1.5, this.tigerGroup.position.z);
                    
                    // Tiger breathing animation
                    this.tigerParts.body.scale.x = 1 + Math.sin(this.time * 3) * 0.02;
                    this.tigerParts.body.scale.z = 1 + Math.sin(this.time * 3) * 0.02;
                } else {
                    this.phase = 'reveal_man';
                    this.phaseTime = 0;
                }
                break;

            case 'reveal_man':
                // Show man, then start chase
                if (pt < 3) {
                    this.camera.position.set(
                        3,
                        3,
                        this.manGroup.position.z + 5
                    );
                    this.camera.lookAt(this.manGroup.position.x, 2, this.manGroup.position.z);
                    this.showSubtitle('Run.', 2000);
                } else {
                    this.phase = 'chase';
                    this.phaseTime = 0;
                    this.heartbeat.style.opacity = '1';
                }
                break;

            case 'chase':
                // Main chase sequence
                this.manPosition.z -= moveSpeed * dt;
                this.tigerPosition.z -= moveSpeed * dt;

                // Tiger gradually gets closer
                const tigerCatchUp = 0.5 * dt;
                const dist = this.manPosition.z - this.tigerPosition.z;
                if (dist < 20) {
                    this.tigerPosition.z -= tigerCatchUp * 0.5;
                } else {
                    this.tigerPosition.z -= tigerCatchUp;
                }

                this.manGroup.position.z = this.manPosition.z;
                this.tigerGroup.position.z = this.tigerPosition.z;

                // Man slight weaving
                this.manGroup.position.x = Math.sin(this.time * 1.5) * 1.5;
                this.manGroup.rotation.y = Math.PI + Math.sin(this.time * 1.5) * 0.1;

                // Tiger follows man's x position with delay
                this.tigerGroup.position.x += (this.manGroup.position.x - this.tigerGroup.position.x) * 2 * dt;
                this.tigerGroup.rotation.y = Math.PI;

                this.animateMan(dt, moveSpeed);
                this.animateTiger(dt, moveSpeed);

                // Camera positions - cinematic cuts
                const camPhase = Math.floor(pt / 4) % 5;
                const camT = (pt % 4) / 4;

                switch (camPhase) {
                    case 0: // Behind man, looking forward
                        this.camera.position.set(
                            this.manGroup.position.x + Math.sin(camT * 0.5) * 1,
                            3 + Math.sin(camT * 2) * 0.5,
                            this.manGroup.position.z + 8
                        );
                        this.camera.lookAt(
                            this.manGroup.position.x,
                            2,
                            this.manGroup.position.z - 5
                        );
                        this.cameraShakeIntensity = 0.15;
                        break;
                    case 1: // Side tracking shot
                        this.camera.position.set(
                            this.manGroup.position.x + 6,
                            2.5,
                            this.manGroup.position.z + 2
                        );
                        this.camera.lookAt(
                            this.manGroup.position.x,
                            2,
                            this.manGroup.position.z
                        );
                        this.cameraShakeIntensity = 0.1;
                        break;
                    case 2: // Low angle behind tiger
                        this.camera.position.set(
                            this.tigerGroup.position.x,
                            0.8,
                            this.tigerGroup.position.z + 6
                        );
                        this.camera.lookAt(
                            this.manGroup.position.x,
                            2,
                            this.manGroup.position.z
                        );
                        this.cameraShakeIntensity = 0.2;
                        break;
                    case 3: // Overhead drone shot
                        this.camera.position.set(
                            this.manGroup.position.x,
                            18,
                            this.manGroup.position.z + 5
                        );
                        this.camera.lookAt(
                            this.manGroup.position.x,
                            0,
                            this.manGroup.position.z - 5
                        );
                        this.cameraShakeIntensity = 0.05;
                        break;
                    case 4: // Front facing (man running toward camera)
                        this.camera.position.set(
                            this.manGroup.position.x + Math.sin(camT) * 2,
                            2,
                            this.manGroup.position.z - 8
                        );
                        this.camera.lookAt(
                            this.manGroup.position.x,
                            2,
                            this.manGroup.position.z
                        );
                        this.cameraShakeIntensity = 0.15;
                        break;
                }

                // Heartbeat
                const bpm = Math.min(190, 140 + pt * 3);
                this.heartbeatText.textContent = `♥ ${Math.floor(bpm)} BPM`;
                if (Math.floor(this.time * bpm / 60) !== Math.floor((this.time - dt) * bpm / 60)) {
                    this.heartbeatText.style.transform = 'scale(1.3)';
                    setTimeout(() => this.heartbeatText.style.transform = 'scale(1)', 100);
                    if (Math.random() < 0.3) this.playHeartbeat();
                }

                // Subtitles during chase
                if (pt > 2 && pt < 4) this.showSubtitle('His lungs burned with every breath.', 3000);
                if (pt > 8 && pt < 10) this.showSubtitle('The beast was gaining ground.', 3000);
                if (pt > 14 && pt < 16) this.showSubtitle('He could hear it breathing behind him.', 3000);

                // Footstep sounds
                if (Math.floor(this.runCycle * 2) !== Math.floor((this.runCycle - dt * moveSpeed * 1.2) * 2)) {
                    this.playFootstep();
                }

                // Transition to close chase
                if (pt > 18) {
                    this.phase = 'close_chase';
                    this.phaseTime = 0;
                    this.showSubtitle('The waterfall... his only chance.', 4000);
                }

                // Move sun light
                this.sunLight.position.z = this.manGroup.position.z + 20;
                this.sunLight.target.position.z = this.manGroup.position.z;
                break;

            case 'close_chase':
                // Tiger very close, intense
                this.manPosition.z -= moveSpeed * 1.2 * dt;
                this.tigerPosition.z -= moveSpeed * 1.4 * dt;

                // Clamp tiger distance
                if (this.manPosition.z - this.tigerPosition.z < 5) {
                    this.tigerPosition.z = this.manPosition.z + 5;
                }

                this.manGroup.position.z = this.manPosition.z;
                this.tigerGroup.position.z = this.tigerPosition.z;

                this.manGroup.position.x = Math.sin(this.time * 2) * 1;
                this.manGroup.rotation.y = Math.PI + Math.sin(this.time * 2) * 0.15;
                this.tigerGroup.position.x += (this.manGroup.position.x - this.tigerGroup.position.x) * 3 * dt;
                this.tigerGroup.rotation.y = Math.PI;

                this.animateMan(dt, moveSpeed * 1.3);
                this.animateTiger(dt, moveSpeed * 1.5);

                // Intense close camera
                if (pt < 2) {
                    // Close on man's terrified face
                    this.camera.position.set(
                        this.manGroup.position.x + 0.5,
                        3,
                        this.manGroup.position.z - 2
                    );
                    this.camera.lookAt(this.manGroup.position.x, 2.8, this.manGroup.position.z);
                } else if (pt < 4) {
                    // Tiger close-up snarl
                    this.camera.position.set(
                        this.tigerGroup.position.x + 1,
                        1.5,
                        this.tigerGroup.position.z + 3
                    );
                    this.camera.lookAt(this.tigerGroup.position.x, 1.5, this.tigerGroup.position.z);
                } else {
                    // Behind chase, close
                    this.camera.position.set(
                        this.manGroup.position.x + 3,
                        3,
                        this.manGroup.position.z + 4
                    );
                    this.camera.lookAt(
                        this.manGroup.position.x,
                        2,
                        this.manGroup.position.z - 3
                    );
                }

                this.cameraShakeIntensity = 0.3;

                // Heartbeat more frantic
                this.heartbeatText.textContent = `♥ ${Math.floor(190 + Math.random() * 10)} BPM`;
                this.heartbeatText.style.color = '#ff0000';

                this.sunLight.position.z = this.manGroup.position.z + 20;

                // Play waterfall sound as approaching
                if (this.manPosition.z < -80) {
                    this.playWaterfall();
                }

                if (pt > 2) {
                    this.showSubtitle('There was no other way...', 3000);
                }

                // Transition to waterfall jump
                if (this.manPosition.z < -120 || pt > 8) {
                    this.phase = 'waterfall_approach';
                    this.phaseTime = 0;
                    this.manPosition.z = -125;
                    this.tigerPosition.z = -120;
                    this.showSubtitle('JUMP!', 2000);
                }
                break;

            case 'waterfall_approach':
                // Dramatic slow-mo approach to cliff edge
                const approachSpeed = moveSpeed * (1 - Math.min(1, pt / 2) * 0.7);
                this.manPosition.z -= approachSpeed * dt;
                
                this.manGroup.position.z = this.manPosition.z;
                this.manGroup.position.x = 0;
                this.tigerGroup.position.z = this.tigerPosition.z;

                if (pt < 2) {
                    this.animateMan(dt, approachSpeed * 0.8);
                    this.tigerPosition.z -= moveSpeed * 0.5 * dt;
                    this.animateTiger(dt, moveSpeed * 0.5);
                }

                // Camera: sweeping to show waterfall ahead
                this.camera.position.set(
                    8 - pt * 2,
                    4 + pt * 1,
                    this.manGroup.position.z + 3 - pt * 2
                );
                this.camera.lookAt(
                    this.manGroup.position.x,
                    2 - pt * 0.5,
                    this.manGroup.position.z - 5
                );

                this.cameraShakeIntensity = 0.15;

                if (pt > 2) {
                    this.phase = 'jump';
                    this.phaseTime = 0;
                    this.jumpStarted = true;
                    this.jumpStartZ = this.manGroup.position.z;
                    this.jumpStartY = 0;
                    this.heartbeat.style.opacity = '0';
                    this.showSubtitle('', 100);
                }
                break;

            case 'jump':
                // THE JUMP - slow motion
                const jumpDuration = 8;
                const jp = Math.min(1, pt / jumpDuration);

                // Jump physics (slowed)
                const jumpVelocityY = 8;
                const jumpVelocityZ = -6;
                const gravity = 12;

                if (jp < 0.15) {
                    // Crouching
                    this.manGroup.position.z = this.jumpStartZ;
                    this.manGroup.position.y = 0 - jp / 0.15 * 0.3;
                } else {
                    const flyTime = (jp - 0.15) / 0.85;
                    this.manGroup.position.z = this.jumpStartZ + jumpVelocityZ * flyTime * jumpDuration;
                    this.manGroup.position.y = this.jumpStartY + 
                        jumpVelocityY * flyTime * jumpDuration * 0.15 - 
                        0.5 * gravity * Math.pow(flyTime * jumpDuration * 0.15, 2);
                }

                this.manGroup.position.x = Math.sin(jp * 2) * 0.5;

                this.animateManJump(dt, jp);

                // Tiger stops at edge
                if (pt < 3) {
                    this.tigerPosition.z -= moveSpeed * 0.3 * dt;
                    this.animateTiger(dt, moveSpeed * 0.3);
                } else {
                    // Tiger at edge, looking down
                    this.tigerParts.head.rotation.x = 0.3;
                }
                this.tigerGroup.position.z = Math.max(this.tigerPosition.z, -130);

                // Cinematic camera for jump
                if (jp < 0.2) {
                    // Low angle, about to jump
                    this.camera.position.set(
                        3,
                        1,
                        this.manGroup.position.z - 3
                    );
                    this.camera.lookAt(this.manGroup.position.x, 2, this.manGroup.position.z);
                    this.cameraShakeIntensity = 0.1;
                } else if (jp < 0.4) {
                    // Side view of launch
                    const t = (jp - 0.2) / 0.2;
                    this.camera.position.set(
                        6,
                        3 + t * 2,
                        this.manGroup.position.z + 2
                    );
                    this.camera.lookAt(this.manGroup.position);
                    this.cameraShakeIntensity = 0.05;
                } else if (jp < 0.6) {
                    // Slow-mo Matrix style rotating camera
                    const t = (jp - 0.4) / 0.2;
                    const angle = t * Math.PI;
                    this.camera.position.set(
                        this.manGroup.position.x + Math.cos(angle) * 6,
                        this.manGroup.position.y + 2,
                        this.manGroup.position.z + Math.sin(angle) * 6
                    );
                    this.camera.lookAt(this.manGroup.position);
                    this.cameraShakeIntensity = 0.02;
                } else if (jp < 0.8) {
                    // Looking up at falling man from below
                    const t = (jp - 0.6) / 0.2;
                    this.camera.position.set(
                        this.manGroup.position.x + 2,
                        this.manGroup.position.y - 8 - t * 5,
                        this.manGroup.position.z - 3
                    );
                    this.camera.lookAt(this.manGroup.position);
                    this.cameraShakeIntensity = 0.05;
                } else {
                    // Wide shot of the fall
                    this.camera.position.set(
                        15,
                        this.manGroup.position.y + 5,
                        this.manGroup.position.z + 10
                    );
                    this.camera.lookAt(this.manGroup.position);
                    this.cameraShakeIntensity = 0.03;
                }

                // Cut to tiger at edge looking down (brief)
                if (jp > 0.5 && jp < 0.55) {
                    this.camera.position.set(
                        this.tigerGroup.position.x + 2,
                        2,
                        this.tigerGroup.position.z + 3
                    );
                    this.camera.lookAt(this.tigerGroup.position.x, 1.5, this.tigerGroup.position.z);
                }

                // Update waterfall shader
                if (this.waterfallMaterial) {
                    this.waterfallMaterial.uniforms.time.value = this.time;
                }

                this.sunLight.position.z = this.manGroup.position.z + 20;

                if (jp >= 1) {
                    this.phase = 'splash';
                    this.phaseTime = 0;
                    this.createSplash();
                    this.showSubtitle('He survived... this time.', 5000);
                }
                break;

            case 'splash':
                // Splash impact and aftermath
                if (pt < 1) {
                    // Impact flash
                    this.renderer.toneMappingExposure = 0.8 + (1 - pt) * 2;
                    this.cameraShakeIntensity = 1 - pt;
                } else {
                    this.renderer.toneMappingExposure = 0.8;
                    this.cameraShakeIntensity = Math.max(0, 0.1 - pt * 0.01);
                }

                // Camera slowly pulls back
                const splashTarget = new THREE.Vector3(
                    this.manGroup.position.x,
                    this.manGroup.position.y,
                    this.manGroup.position.z
                );

                this.camera.position.set(
                    splashTarget.x + 10 + pt * 2,
                    splashTarget.y + 5 + pt * 3,
                    splashTarget.z + 8 + pt * 2
                );
                this.camera.lookAt(splashTarget);

                // Man sinking
                if (this.manGroup.position.y > -40) {
                    this.manGroup.position.y -= dt * 2;
                }

                // Update splash particles
                this.updateSplashParticles(dt);

                // Tiger pacing at top
                this.tigerGroup.position.x = Math.sin(this.time * 0.5) * 3;
                this.tigerParts.head.rotation.x = 0.3;

                if (pt > 6) {
                    this.phase = 'ending';
                    this.phaseTime = 0;
                }
                break;

            case 'ending':
                // Final wide shot, fade to black
                const endProgress = Math.min(1, pt / 5);
                
                this.camera.position.set(
                    20,
                    15 + endProgress * 10,
                    -110
                );
                this.camera.lookAt(0, -10, -130);

                this.renderer.toneMappingExposure = Math.max(0, 0.8 - endProgress * 0.8);

                if (pt > 3 && pt < 5) {
                    this.showSubtitle('The forest kept its secrets.', 4000);
                }

                if (pt > 6) {
                    document.getElementById('restart-btn').style.display = 'block';
                    const titleCard = document.getElementById('title-card');
                    titleCard.querySelector('p').textContent = 'A Story of Survival';
                    titleCard.style.opacity = '1';
                }
                break;
        }

        // Camera shake
        if (this.cameraShakeIntensity > 0) {
            this.camera.position.x += (Math.random() - 0.5) * this.cameraShakeIntensity;
            this.camera.position.y += (Math.random() - 0.5) * this.cameraShakeIntensity * 0.5;
        }
    }

    createSplash() {
        this.splashParticles = [];
        for (let i = 0; i < 100; i++) {
            const size = 0.1 + Math.random() * 0.3;
            const geo = new THREE.SphereGeometry(size, 4, 4);
            const mat = new THREE.MeshBasicMaterial({
                color: new THREE.Color().setHSL(0.55, 0.5, 0.6 + Math.random() * 0.3),
                transparent: true,
                opacity: 0.8
            });
            const p = new THREE.Mesh(geo, mat);
            p.position.copy(this.manGroup.position);
            p.position.y = -37;

            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 8;
            p.userData = {
                vel: new THREE.Vector3(
                    Math.cos(angle) * speed,
                    5 + Math.random() * 10,
                    Math.sin(angle) * speed
                ),
                life: 1
            };  
            this.scene.add(p);
            this.splashParticles.push(p);
        }
    }

    updateSplashParticles(dt) {
        if (!this.splashParticles) return;
        this.splashParticles.forEach(p => {
            p.userData.life -= dt * 0.5;
            if (p.userData.life <= 0) {
                p.material.opacity = 0;
                return;
            }
            p.position.add(p.userData.vel.clone().multiplyScalar(dt));
            p.userData.vel.y -= 15 * dt;
            p.material.opacity = p.userData.life * 0.8;
            p.scale.setScalar(1 + (1 - p.userData.life));
        });
    }

    animate() {
        requestAnimationFrame(() => this.animate());

        const dt = Math.min(this.clock.getDelta(), 0.05);
        this.time += dt;

        this.updateCinematic(dt);
        this.updateParticles(dt);
        this.drawSpeedLines();

        // Update waterfall shader
        if (this.waterfallMaterial) {
            this.waterfallMaterial.uniforms.time.value = this.time;
        }

        // Animate speed lines opacity
        const speedLines = document.getElementById('speed-lines');
        if (this.phase === 'chase' || this.phase === 'close_chase') {
            speedLines.style.opacity = this.phase === 'close_chase' ? '0.3' : '0.1';
        } else {
            speedLines.style.opacity = '0';
        }

        this.renderer.render(this.scene, this.camera);
    }

    onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.speedLinesCanvas.width = window.innerWidth;
        this.speedLinesCanvas.height = window.innerHeight;
    }
}

// Start
const engine = new CinematicEngine();
</script>
